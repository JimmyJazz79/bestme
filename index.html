<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0F0F0F">
    <meta name="description" content="BestMe - Personal Performance Tracker">
    <title>BestMe</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..150,400;9..150,500;9..150,600;9..150,700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React 18 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Recharts -->
    <script src="https://unpkg.com/recharts@2.10.3/dist/Recharts.js"></script>
    
    <style>
        * {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        body {
            background: #0F0F0F;
            color: #FFFFFF;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        
        html, body, #root {
            height: 100%;
        }
        
        .bestme-container {
            max-width: 480px;
            margin: 0 auto;
            background: #0F0F0F;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .bestme-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding-bottom: 80px;
            padding-top: 16px;
            padding-left: 16px;
            padding-right: 16px;
        }
        
        .bestme-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            max-width: 480px;
            width: 100%;
            background: #161616;
            border-top: 1px solid #2A2A2A;
            display: flex;
            justify-content: space-around;
            z-index: 40;
        }
        
        .bestme-nav-item {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 0;
            cursor: pointer;
            border: none;
            background: none;
            color: #888;
            font-size: 12px;
            transition: all 0.2s ease;
            min-height: 60px;
        }
        
        .bestme-nav-item.active {
            color: #E8620A;
        }
        
        .bestme-nav-item:active {
            background: rgba(232, 98, 10, 0.1);
        }
        
        .bestme-card {
            background: #161616;
            border: 1px solid #2A2A2A;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
        
        .bestme-button {
            background: #E8620A;
            color: #FFFFFF;
            border: none;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 44px;
        }
        
        .bestme-button:active {
            background: #D25409;
            transform: scale(0.98);
        }
        
        .bestme-button-secondary {
            background: #2A2A2A;
            color: #FFFFFF;
            border: none;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 44px;
        }
        
        .bestme-button-secondary:active {
            background: #333;
        }
        
        .bestme-input {
            background: #0F0F0F;
            border: 1px solid #2A2A2A;
            border-radius: 8px;
            padding: 12px;
            color: #FFFFFF;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
        }
        
        .bestme-input::placeholder {
            color: #666;
        }
        
        .bestme-input:focus {
            outline: none;
            border-color: #E8620A;
            box-shadow: 0 0 0 3px rgba(232, 98, 10, 0.1);
        }
        
        .habit-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #2A2A2A;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
            min-height: 44px;
            background: #0F0F0F;
            font-size: 18px;
        }
        
        .habit-cell:active:not(.disabled) {
            transform: scale(0.95);
        }
        
        .habit-cell.complete {
            background: #E8620A;
            border-color: #E8620A;
            color: #FFFFFF;
            animation: fillPulse 0.4s ease;
        }
        
        .habit-cell.disabled {
            background: #1A1A1A;
            border-color: #2A2A2A;
            color: #555;
            cursor: not-allowed;
        }
        
        @keyframes fillPulse {
            0% {
                transform: scale(0.9);
                opacity: 0.8;
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #2A2A2A;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 8px;
        }
        
        .progress-fill {
            height: 100%;
            background: #E8620A;
            border-radius: 2px;
            transition: width 0.3s ease;
        }
        
        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 50;
            display: flex;
            align-items: flex-end;
        }
        
        .modal-content {
            background: #161616;
            border-top: 1px solid #2A2A2A;
            border-radius: 20px 20px 0 0;
            padding: 20px;
            width: 100%;
            animation: slideUp 0.3s ease;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }
        
        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 20px;
        }
        
        .numpad-btn {
            background: #2A2A2A;
            color: #FFFFFF;
            border: none;
            border-radius: 8px;
            padding: 16px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.1s ease;
            min-height: 50px;
        }
        
        .numpad-btn:active {
            background: #3A3A3A;
            transform: scale(0.95);
        }
        
        .numpad-display {
            background: #0F0F0F;
            border: 1px solid #2A2A2A;
            border-radius: 8px;
            padding: 16px;
            text-align: right;
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #E8620A;
        }
        
        .rating-picker {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 12px;
        }
        
        .rating-btn {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            border: 1px solid #2A2A2A;
            background: #0F0F0F;
            color: #888;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        
        .rating-btn.selected {
            background: #E8620A;
            border-color: #E8620A;
            color: #FFFFFF;
        }
        
        .rating-btn:active {
            transform: scale(0.95);
        }
        
        .rating-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        
        .rating-dot.low {
            background: #CC4444;
        }
        
        .rating-dot.mid {
            background: #D4A61A;
        }
        
        .rating-dot.high {
            background: #4CAF50;
        }
        
        .notification-banner {
            background: #1A3A1A;
            border: 1px solid #4CAF50;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #CCFFCC;
        }
        
        .collapsible-header {
            cursor: pointer;
            padding: 12px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2A2A2A;
            transition: all 0.2s ease;
        }
        
        .collapsible-header:active {
            opacity: 0.7;
        }
        
        .collapsible-icon {
            transition: transform 0.2s ease;
        }
        
        .collapsible-icon.open {
            transform: rotate(180deg);
        }
        
        .dropdown-select {
            background: #0F0F0F;
            border: 1px solid #2A2A2A;
            border-radius: 8px;
            padding: 12px;
            color: #FFFFFF;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
            cursor: pointer;
        }
        
        .dropdown-select:focus {
            outline: none;
            border-color: #E8620A;
        }
        
        .dropdown-select option {
            background: #161616;
            color: #FFFFFF;
        }
        
        .stats-row {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }
        
        .stat-card {
            flex: 1;
            background: #0F0F0F;
            border: 1px solid #2A2A2A;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #E8620A;
            margin-bottom: 4px;
        }
        
        .stat-label {
            font-size: 12px;
            color: #888;
            font-weight: 500;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #CCC;
            margin-bottom: 8px;
        }
        
        .recharts-default-tooltip {
            background: #161616 !important;
            border: 1px solid #2A2A2A !important;
            border-radius: 8px !important;
        }
        
        .recharts-tooltip-label {
            color: #FFFFFF !important;
        }
        
        .recharts-tooltip-item {
            color: #E8620A !important;
        }
        
        .recharts-text {
            fill: #888 !important;
        }
        
        .recharts-cartesian-grid line {
            stroke: #2A2A2A !important;
        }
        
        @supports (padding: max(0px)) {
            body {
                padding-bottom: max(env(safe-area-inset-bottom), 0px);
            }
            .bestme-content {
                padding-bottom: calc(80px + max(env(safe-area-inset-bottom), 0px));
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;
        const { LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell } = Recharts;
        
        // Utility functions
        const getISOWeek = (date = new Date()) => {
            const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
            const dayNum = d.getUTCDay() || 7;
            d.setUTCDate(d.getUTCDate() + 4 - dayNum);
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            const weekNum = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
            return `${d.getUTCFullYear()}-W${String(weekNum).padStart(2, '0')}`;
        };
        
        const getDateString = (date = new Date()) => {
            return date.toISOString().split('T')[0];
        };
        
        const getDayOfWeek = (dateStr) => {
            const date = new Date(dateStr + 'T00:00:00Z');
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            return days[date.getUTCDay()];
        };
        
        const getDayIndex = (dateStr) => {
            const date = new Date(dateStr + 'T00:00:00Z');
            return date.getUTCDay();
        };
        
        const getWeekDates = (weekKey) => {
            const [year, week] = weekKey.split('-W').map(Number);
            const simple = new Date(year, 0, 1 + (week - 1) * 7);
            const monday = new Date(simple);
            monday.setDate(monday.getDate() - simple.getDay() + 1);
            const dates = [];
            for (let i = 0; i < 7; i++) {
                const d = new Date(monday);
                d.setDate(d.getDate() + i);
                dates.push(getDateString(d));
            }
            return dates;
        };
        
        const getTodayDateString = () => {
            const today = new Date();
            return `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
        };
        
        const getDayName = (dayIndex) => {
            return ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'][dayIndex];
        };
        
        const getDateShortly = (dateStr) => {
            const date = new Date(dateStr + 'T00:00:00Z');
            const today = new Date(getTodayDateString() + 'T00:00:00Z');
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            
            if (dateStr === getDateString(today)) return 'Today';
            if (dateStr === getDateString(yesterday)) return 'Yesterday';
            
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            return `${months[date.getMonth()]} ${date.getDate()}`;
        };
        
        // Storage functions
        const getHabits = () => {
            const stored = localStorage.getItem('bm_habits');
            return stored ? JSON.parse(stored) : {};
        };
        
        const saveHabits = (habits) => {
            localStorage.setItem('bm_habits', JSON.stringify(habits));
        };
        
        const getSessions = () => {
            const stored = localStorage.getItem('bm_sessions');
            return stored ? JSON.parse(stored) : [];
        };
        
        const saveSessions = (sessions) => {
            localStorage.setItem('bm_sessions', JSON.stringify(sessions));
        };
        
        const getRounds = () => {
            const stored = localStorage.getItem('bm_rounds');
            return stored ? JSON.parse(stored) : [];
        };
        
        const saveRounds = (rounds) => {
            localStorage.setItem('bm_rounds', JSON.stringify(rounds));
        };
        
        const getWeeklyReviews = () => {
            const stored = localStorage.getItem('bm_weeklyReviews');
            return stored ? JSON.parse(stored) : {};
        };
        
        const saveWeeklyReviews = (reviews) => {
            localStorage.setItem('bm_weeklyReviews', JSON.stringify(reviews));
        };
        
        const getMonthlyFocus = () => {
            const stored = localStorage.getItem('bm_monthlyFocus');
            return stored ? JSON.parse(stored) : [];
        };
        
        const saveMonthlyFocus = (focus) => {
            localStorage.setItem('bm_monthlyFocus', JSON.stringify(focus));
        };
        
        const getQuarterlyReviews = () => {
            const stored = localStorage.getItem('bm_quarterlyReviews');
            return stored ? JSON.parse(stored) : [];
        };
        
        const saveQuarterlyReviews = (reviews) => {
            localStorage.setItem('bm_quarterlyReviews', JSON.stringify(reviews));
        };
        
        const getSettings = () => {
            const stored = localStorage.getItem('bm_settings');
            const defaults = {
                currentHandicap: 21.2,
                startingHandicap: 21.2,
                targetHandicap: 10,
                appStartDate: getTodayDateString(),
                notificationsEnabled: false
            };
            return stored ? { ...defaults, ...JSON.parse(stored) } : defaults;
        };
        
        const saveSettings = (settings) => {
            localStorage.setItem('bm_settings', JSON.stringify(settings));
        };
        
        // Habit definitions
        const HABIT_CONFIG = {
            sleep: { label: 'Sleep', target: 7, type: 'bool', weekdaysOnly: false },
            creatine: { label: 'Creatine', target: 7, type: 'bool', weekdaysOnly: false },
            trello: { label: 'Day Planned', target: 5, type: 'bool', weekdaysOnly: true },
            study: { label: 'Study', target: 10, type: 'numeric', unit: 'hrs', weekdaysOnly: false },
            gym: { label: 'Gym', target: 2, type: 'bool', weekdaysOnly: false },
            run: { label: 'Run', target: 20, type: 'numeric', unit: 'km', weekdaysOnly: false },
            range: { label: 'Golf Range', target: 1, type: 'bool', weekdaysOnly: false },
            yoga: { label: 'Yoga', target: 1, type: 'bool', weekdaysOnly: false }
        };
        
        const HABITS_ORDER = ['sleep', 'creatine', 'trello', 'study', 'gym', 'run', 'range', 'yoga'];
        
        // BestMe App
        const BestMeApp = () => {
            const [currentTab, setCurrentTab] = useState('week');
            const [habits, setHabits] = useState(getHabits());
            const [sessions, setSessions] = useState(getSessions());
            const [rounds, setRounds] = useState(getRounds());
            const [weeklyReviews, setWeeklyReviews] = useState(getWeeklyReviews());
            const [monthlyFocus, setMonthlyFocus] = useState(getMonthlyFocus());
            const [quarterlyReviews, setQuarterlyReviews] = useState(getQuarterlyReviews());
            const [settings, setSettings] = useState(getSettings());
            const [notificationBannerVisible, setNotificationBannerVisible] = useState(false);
            
            // Persist to localStorage
            useEffect(() => {
                saveHabits(habits);
            }, [habits]);
            
            useEffect(() => {
                saveSessions(sessions);
            }, [sessions]);
            
            useEffect(() => {
                saveRounds(rounds);
            }, [rounds]);
            
            useEffect(() => {
                saveWeeklyReviews(weeklyReviews);
            }, [weeklyReviews]);
            
            useEffect(() => {
                saveMonthlyFocus(monthlyFocus);
            }, [monthlyFocus]);
            
            useEffect(() => {
                saveQuarterlyReviews(quarterlyReviews);
            }, [quarterlyReviews]);
            
            useEffect(() => {
                saveSettings(settings);
            }, [settings]);
            
            // Request notification permission
            useEffect(() => {
                if (typeof window !== 'undefined' && 'Notification' in window && Notification.permission === 'default') {
                    Notification.requestPermission().then((permission) => {
                        if (permission === 'granted') {
                            setNotificationBannerVisible(true);
                            const newSettings = { ...settings, notificationsEnabled: true };
                            setSettings(newSettings);
                            setTimeout(() => setNotificationBannerVisible(false), 4000);
                        }
                    });
                }
            }, []);
            
            return (
                <div className="bestme-container">
                    <div className="bestme-content">
                        {notificationBannerVisible && (
                            <div className="notification-banner">
                                Notifications set up! You'll get daily reminders for your habits.
                            </div>
                        )}
                        
                        {currentTab === 'week' && (
                            <WeekTab
                                habits={habits}
                                setHabits={setHabits}
                                sessions={sessions}
                                weeklyReviews={weeklyReviews}
                                setWeeklyReviews={setWeeklyReviews}
                            />
                        )}
                        
                        {currentTab === 'session' && (
                            <SessionTab
                                sessions={sessions}
                                setSessions={setSessions}
                            />
                        )}
                        
                        {currentTab === 'golf' && (
                            <GolfTab
                                rounds={rounds}
                                setRounds={setRounds}
                                settings={settings}
                                setSettings={setSettings}
                                monthlyFocus={monthlyFocus}
                                setMonthlyFocus={setMonthlyFocus}
                            />
                        )}
                        
                        {currentTab === 'insights' && (
                            <InsightsTab
                                habits={habits}
                                sessions={sessions}
                                weeklyReviews={weeklyReviews}
                                quarterlyReviews={quarterlyReviews}
                                setQuarterlyReviews={setQuarterlyReviews}
                            />
                        )}
                    </div>
                    
                    <div className="bestme-nav">
                        <button
                            className={`bestme-nav-item ${currentTab === 'week' ? 'active' : ''}`}
                            onClick={() => setCurrentTab('week')}
                        >
                            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '4px' }}>
                                <span style={{ fontSize: '18px' }}>📅</span>
                                <span>Week</span>
                            </div>
                        </button>
                        <button
                            className={`bestme-nav-item ${currentTab === 'session' ? 'active' : ''}`}
                            onClick={() => setCurrentTab('session')}
                        >
                            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '4px' }}>
                                <span style={{ fontSize: '18px' }}>⏱️</span>
                                <span>Session</span>
                            </div>
                        </button>
                        <button
                            className={`bestme-nav-item ${currentTab === 'golf' ? 'active' : ''}`}
                            onClick={() => setCurrentTab('golf')}
                        >
                            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '4px' }}>
                                <span style={{ fontSize: '18px' }}>⛳</span>
                                <span>Golf</span>
                            </div>
                        </button>
                        <button
                            className={`bestme-nav-item ${currentTab === 'insights' ? 'active' : ''}`}
                            onClick={() => setCurrentTab('insights')}
                        >
                            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '4px' }}>
                                <span style={{ fontSize: '18px' }}>📊</span>
                                <span>Insights</span>
                            </div>
                        </button>
                    </div>
                </div>
            );
        };
        
        // WEEK TAB
        const WeekTab = ({ habits, setHabits, sessions, weeklyReviews, setWeeklyReviews }) => {
            const [numpadOpen, setNumpadOpen] = useState(false);
            const [numpadValue, setNumpadValue] = useState('');
            const [numpadMode, setNumpadMode] = useState(null); // { habitKey, dateStr }
            const [reviewOpen, setReviewOpen] = useState(false);
            
            const currentWeek = getISOWeek();
            const weekDates = getWeekDates(currentWeek);
            const todayStr = getTodayDateString();
            
            // Ensure week exists in habits
            useEffect(() => {
                if (!habits[currentWeek]) {
                    const newHabits = { ...habits };
                    newHabits[currentWeek] = {};
                    weekDates.forEach(dateStr => {
                        newHabits[currentWeek][dateStr] = {};
                        HABITS_ORDER.forEach(key => {
                            const config = HABIT_CONFIG[key];
                            const dayIndex = getDayIndex(dateStr);
                            if (config.weekdaysOnly && (dayIndex === 0 || dayIndex === 6)) {
                                newHabits[currentWeek][dateStr][key] = null;
                            } else {
                                newHabits[currentWeek][dateStr][key] = config.type === 'bool' ? false : 0;
                            }
                        });
                    });
                    setHabits(newHabits);
                }
            }, []);
            
            const toggleHabit = (habitKey, dateStr) => {
                const config = HABIT_CONFIG[habitKey];
                if (config.type === 'bool') {
                    const newHabits = { ...habits };
                    const current = newHabits[currentWeek]?.[dateStr]?.[habitKey];
                    newHabits[currentWeek][dateStr][habitKey] = !current;
                    setHabits(newHabits);
                } else {
                    setNumpadMode({ habitKey, dateStr });
                    setNumpadValue(String(habits[currentWeek]?.[dateStr]?.[habitKey] || 0));
                    setNumpadOpen(true);
                }
            };
            
            const handleNumpadInput = (char) => {
                if (char === 'back') {
                    setNumpadValue(numpadValue.slice(0, -1));
                } else if (char === 'dot') {
                    if (!numpadValue.includes('.')) {
                        setNumpadValue(numpadValue || '0' + '.');

                } else {
                    setNumpadValue(numpadValue + char);

            const handleNumpadConfirm = () => {
                const value = parseFloat(numpadValue) || 0;
                const newHabits = { ...habits };
                newHabits[currentWeek][numpadMode.dateStr][numpadMode.habitKey] = value;
                setHabits(newHabits);
                setNumpadOpen(false);
                setNumpadMode(null);
                setNumpadValue('');
            };
            
            const calculateCompletion = (habitKey, dateStr) => {
                const dayIndex = getDayIndex(dateStr);
                const config = HABIT_CONFIG[habitKey];
                if (config.weekdaysOnly && (dayIndex === 0 || dayIndex === 6)) {
                    return { isWeekdayOff: true };
                }
                
                const value = habits[currentWeek]?.[dateStr]?.[habitKey];
                if (config.type === 'bool') {
                    return { isComplete: !!value };
                } else {
                    return { value: value || 0, target: config.target };
                }
            };
            
            const calculateWeeklyStats = () => {
                let completedHabits = 0;
                let totalHabits = 0;
                
                HABITS_ORDER.forEach(habitKey => {
                    const config = HABIT_CONFIG[habitKey];
                    let habitCount = 0;
                    let habitTarget = 0;
                    
                    weekDates.forEach(dateStr => {
                        const dayIndex = getDayIndex(dateStr);
                        if (config.weekdaysOnly && (dayIndex === 0 || dayIndex === 6)) return;
                        
                        const value = habits[currentWeek]?.[dateStr]?.[habitKey];
                        if (config.type === 'bool') {
                            if (value) habitCount++;
                            habitTarget++;
                        } else {
                            habitCount += value || 0;
                            habitTarget += config.target;
                        }
                    });
                    
                    if (habitTarget > 0) {
                        completedHabits += (habitCount / habitTarget);
                        totalHabits++;
                    }
                });
                
                const weeklyScore = totalHabits > 0 ? Math.min(100, Math.round((completedHabits / totalHabits) * 100)) : 0;
                return { completed: Math.round(completedHabits), weeklyScore };
            };
            
            const { completed, weeklyScore } = calculateWeeklyStats();
            
            const currentReview = weeklyReviews[currentWeek] || {};
            
            return (
                <>
                    <div>
                        <h1 style={{ fontSize: '28px', fontWeight: '700', marginBottom: '24px' }}>BestMe</h1>
                        
                        {/* Habit Grid */}
                        <div className="bestme-card">
                            <h2 style={{ fontSize: '14px', fontWeight: '600', marginBottom: '16px', color: '#CCC' }}>This Week</h2>
                            <div style={{ overflowX: 'auto' }}>
                                <table style={{ width: '100%', borderCollapse: 'collapse' }}>
                                    <thead>
                                        <tr>
                                            <th style={{ textAlign: 'left', paddingRight: '8px', fontSize: '12px', color: '#888', fontWeight: '500', paddingBottom: '8px' }}>Habit</th>
                                            {weekDates.map((dateStr, idx) => (
                                                <th key={idx} style={{
                                                    textAlign: 'center',
                                                    fontSize: '11px',
                                                    color: dateStr === todayStr ? '#E8620A' : '#888',
                                                    fontWeight: dateStr === todayStr ? '600' : '500',
                                                    paddingBottom: '8px',
                                                    minWidth: '38px'
                                                }}>
                                                    {getDayName(getDayIndex(dateStr)).substring(0, 1)}
                                                </th>
                                            ))}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {HABITS_ORDER.map(habitKey => {
                                            const config = HABIT_CONFIG[habitKey];
                                            let weekTotal = 0;
                                            let weekTarget = 0;
                                            
                                            weekDates.forEach(dateStr => {
                                                const dayIndex = getDayIndex(dateStr);
                                                if (config.weekdaysOnly && (dayIndex === 0 || dayIndex === 6)) return;
                                                
                                                const value = habits[currentWeek]?.[dateStr]?.[habitKey];
                                                if (config.type === 'bool') {
                                                    if (value) weekTotal++;
                                                    weekTarget++;
                                                } else {
                                                    weekTotal += value || 0;
                                                    weekTarget += config.target;
                                                }
                                            });
                                            
                                            const progressPercent = weekTarget > 0 ? (weekTotal / weekTarget) * 100 : 0;
                                            const labelText = config.type === 'bool'
                                                ? `${config.label} ${weekTotal}/${weekTarget}`
                                                : `${config.label} ${weekTotal.toFixed(1)}/${weekTarget} ${config.unit}`;
                                            
                                            return (
                                                <tr key={habitKey}>
                                                    <td style={{ paddingRight: '8px', paddingTop: '8px', paddingBottom: '8px' }}>
                                                        <div style={{ fontSize: '12px', fontWeight: '500', color: '#CCC', marginBottom: '6px' }}>
                                                            {labelText}
                                                        </div>
                                                        <div className="progress-bar">
                                                            <div className="progress-fill" style={{ width: `${progressPercent}%` }}></div>
                                                        </div>
                                                    </td>
                                                    {weekDates.map((dateStr, idx) => {
                                                        const completion = calculateCompletion(habitKey, dateStr);
                                                        let cellClass = 'habit-cell';
                                                        let cellContent = '';
                                                        
                                                        if (completion.isWeekdayOff) {
                                                            cellClass += ' disabled';
                                                            cellContent = '—';
                                                        } else if (config.type === 'bool') {
                                                            if (completion.isComplete) {
                                                                cellClass += ' complete';
                                                                cellContent = '✓';
                                                            }
                                                        } else {
                                                            cellContent = completion.value > 0 ? completion.value.toFixed(1) : '';
                                                            if (completion.value >= completion.target) {
                                                                cellClass += ' complete';
                                                            }
                                                        }
                                                        
                                                        return (
                                                            <td key={idx} style={{ textAlign: 'center', padding: '4px', minWidth: '38px' }}>
                                                                <div
                                                                    className={cellClass}
                                                                    onClick={() => !completion.isWeekdayOff && toggleHabit(habitKey, dateStr)}
                                                                >
                                                                    {cellContent}
                                                                </div>
                                                            </td>
                                                        );
                                                    })}
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        
                        {/* Weekly Summary */}
                        <div className="bestme-card">
                            <h2 style={{ fontSize: '14px', fontWeight: '600', marginBottom: '12px', color: '#CCC' }}>Summary</h2>
                            <div className="stats-row">
                                <div className="stat-card">
                                    <div className="stat-value">{completed}</div>
                                    <div className="stat-label">Habits Completed</div>
                                </div>
                                <div className="stat-card">
                                    <div className="stat-value">{weeklyScore}%</div>
                                    <div className="stat-label">Process Score</div>
                                </div>
                            </div>
                            
                            {/* Sparkline */}
                            <div style={{ marginTop: '12px', fontSize: '12px', color: '#888', marginBottom: '8px' }}>Last 8 weeks</div>
                            <WeeklySparkline habits={habits} />

                                    </button>
                                    <button
                                        className="bestme-button"
                                        style={{ flex: 1 }}
                                        onClick={handleNumpadConfirm}
                                    >
                                        Done
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </>
            );
        };
        
        const WeeklySparkline = ({ habits }) => {
            const currentWeek = getISOWeek();
            const weekNum = parseInt(currentWeek.split('-W')[1]);
            const year = parseInt(currentWeek.split('-W')[0]);
            
            const data = [];
            for (let i = 7; i >= 0; i--) {
                let w = weekNum - i;
                let y = year;
                if (w < 1) {
                    w += 52;
                    y -= 1;
                }
                const weekKey = `${y}-W${String(w).padStart(2, '0')}`;
                const weekData = habits[weekKey];
                
                let score = 0;
                if (weekData) {
                    let completedHabits = 0;
                    let totalHabits = 0;
                    
                    HABITS_ORDER.forEach(habitKey => {
                        const config = HABIT_CONFIG[habitKey];
                        const weekDates = getWeekDates(weekKey);
                        let habitCount = 0;
                        let habitTarget = 0;
                        
                        weekDates.forEach(dateStr => {
                            const dayIndex = getDayIndex(dateStr);
                            if (config.weekdaysOnly && (dayIndex === 0 || dayIndex === 6)) return;
                            
                            const value = weekData[dateStr]?.[habitKey];
                            if (config.type === 'bool') {
                                if (value) habitCount++;
                                habitTarget++;
                            } else {
                                habitCount += value || 0;
                                habitTarget += config.target;
                            }
                        });
                        
                        if (habitTarget > 0) {
                            completedHabits += (habitCount / habitTarget);
                            totalHabits++;
                        }
                    });
                    
                    score = totalHabits > 0 ? Math.min(100, (completedHabits / totalHabits) * 100) : 0;
                }
                
                data.push({ week: `W${w}`, score: Math.round(score) });
            }
            
            return (
                <ResponsiveContainer width="100%" height={60}>
                    <LineChart data={data} margin={{ top: 5, right: 5, left: -20, bottom: 5 }}>
                        <CartesianGrid strokeDasharray="0" stroke="#2A2A2A" vertical={false} />
                        <XAxis dataKey="week" hide />
                        <YAxis hide domain={[0, 100]} />
                        <Line
                            type="monotone"
                            dataKey="score"
                            stroke="#E8620A"
                            dot={false}
                            strokeWidth={2}
                            isAnimationActive={false}
                        />
                    </LineChart>
                </ResponsiveContainer>
            );
        };

                q5: review.q5 || '',
                completedAt: review.completedAt || null

            const handleChange = (field, value) => {

                updated[field] = value;
                setFormData(updated);
                onSave(updated);

            return (

                    <div className="form-group">
                        <label className="form-label">How many habits did I complete this week?</label>
                        <textarea
                            className="bestme-input"

                            onChange={(e) => handleChange('q1', e.target.value)}

                            style={{ minHeight: '80px', resize: 'vertical' }}
                        />
                    </div>
                    <div className="form-group">
                        <label className="form-label">Where did I show up well — what am I proud of?</label>
                        <textarea
                            className="bestme-input"
                            value={formData.q2}
                            onChange={(e) => handleChange('q2', e.target.value)}
                            placeholder="Share your wins..."
                            style={{ minHeight: '80px', resize: 'vertical' }}
                        />
                    </div>
                    <div className="form-group">
                        <label className="form-label">Where did I fall short — and why honestly?</label>
                        <textarea
                            className="bestme-input"
                            value={formData.q3}
                            onChange={(e) => handleChange('q3', e.target.value)}
                            placeholder="Be honest with yourself..."
                            style={{ minHeight: '80px', resize: 'vertical' }}
                        />
                    </div>
                    <div className="form-group">
                        <label className="form-label">Did I practise with intention or just show up?</label>
                        <textarea
                            className="bestme-input"
                            value={formData.q4}
                            onChange={(e) => handleChange('q4', e.target.value)}
                            placeholder="Reflect on your approach..."
                            style={{ minHeight: '80px', resize: 'vertical' }}
                        />
                    </div>
                    <div className="form-group">
                        <label className="form-label">What one thing will I focus on differently next week?</label>
                        <textarea
                            className="bestme-input"
                            value={formData.q5}
                            onChange={(e) => handleChange('q5', e.target.value)}
                            placeholder="Set your intention..."
                            style={{ minHeight: '80px', resize: 'vertical' }}
                        />
                    </div>
                </div>
            );
        };
        
        // SESSION TAB
        const SessionTab = ({ sessions, setSessions }) => {
            const [newSessionOpen, setNewSessionOpen] = useState(false);
            const [openSession, setOpenSession] = useState(null);
            const [completeFormOpen, setCompleteFormOpen] = useState(false);
            
            useEffect(() => {
                const active = sessions.find(s => !s.completed);
                setOpenSession(active || null);
            }, [sessions]);
            
            const startSession = (type, intention, intentionRating) => {
                const newSession = {
                    id: Date.now().toString(),
                    type,
                    date: getTodayDateString(),
                    intentionText: intention,
                    intentionRating,
                    reflectionText: '',
                    processRating: 3,
                    duration: 0,
                    completed: false,
                    startedAt: new Date().toISOString()
                };
                setSessions([newSession, ...sessions]);
                setOpenSession(newSession);
                setNewSessionOpen(false);
            };
            
            const completeSession = (reflection, processRating, duration, golfScore, golfCourse) => {
                const updated = sessions.map(s => {
                    if (s.id === openSession.id) {
                        return {
                            ...s,
                            reflectionText: reflection,
                            processRating,
                            duration,
                            golfScore: s.type === 'golf' ? golfScore : undefined,
                            golfCourse: s.type === 'golf' ? golfCourse : undefined,
                            completed: true
                        };
                    }
                    return s;
                });
                setSessions(updated);
                setOpenSession(null);
                setCompleteFormOpen(false);
            };
            
            const avgProcessRating = sessions
                .filter(s => s.completed && s.date === getTodayDateString())
                .reduce((sum, s) => sum + s.processRating, 0) / Math.max(1, sessions.filter(s => s.completed && s.date === getTodayDateString()).length);
            
            return (
                <div>
                    <h1 style={{ fontSize: '28px', fontWeight: '700', marginBottom: '24px' }}>Sessions</h1>
                    
                    {openSession && !completeFormOpen && (
                        <div className="bestme-card" style={{ background: '#E8620A', borderColor: '#D25409' }}>
                            <h2 style={{ color: '#FFF', marginBottom: '12px', fontSize: '16px', fontWeight: '600' }}>
                                Active Session
                            </h2>
                            <p style={{ color: 'rgba(255,255,255,0.9)', marginBottom: '16px', fontSize: '14px' }}>
                                {openSession.intentionText}
                            </p>
                            <button
                                className="bestme-button"
                                style={{ width: '100%', background: '#FFF', color: '#E8620A', fontWeight: '600' }}
                                onClick={() => setCompleteFormOpen(true)}
                            >
                                Complete Session

                    )}
                    
                    {completeFormOpen && openSession && (
                        <div className="bestme-card">
                            <CompleteSessionForm
                                session={openSession}
                                onComplete={completeSession}
                                onCancel={() => setCompleteFormOpen(false)}
                            />

                    )}
                    
                    {!openSession && !newSessionOpen && (
                        <>
                            {sessions.filter(s => s.completed && s.date === getTodayDateString()).length > 0 && (
                                <div className="bestme-card">
                                    <h2 style={{ fontSize: '14px', fontWeight: '600', marginBottom: '12px', color: '#CCC' }}>
                                        Today's Average
                                    </h2>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                                        <span style={{ fontSize: '24px', fontWeight: '700', color: '#E8620A' }}>
                                            {avgProcessRating.toFixed(1)}
                                        </span>
                                        <span style={{ fontSize: '14px', color: '#888' }}>process rating</span>
                                    </div>
                                </div>
                            )}
                            
                            <button
                                className="bestme-button"
                                style={{ width: '100%', marginBottom: '16px' }}
                                onClick={() => setNewSessionOpen(true)}

                    {newSessionOpen && (
                        <div className="bestme-card">
                            <NewSessionForm
                                onStart={startSession}
                                onCancel={() => setNewSessionOpen(false)}

                        </div>
                    )}
                    
                    {/* Session History */}
                    <div style={{ marginTop: '24px' }}>
                        <h2 style={{ fontSize: '14px', fontWeight: '600', marginBottom: '12px', color: '#CCC' }}>History</h2>
                        {sessions.filter(s => s.completed).reverse().map(session => (
                            <SessionHistoryItem key={session.id} session={session} />
                        ))}
                    </div>
                </div>
            );
        };
        
        const NewSessionForm = ({ onStart, onCancel }) => {
            const [type, setType] = useState('gym');
            const [intention, setIntention] = useState('');
            const [rating, setRating] = useState(3);
            
            return (
                <>
                    <h2 style={{ fontSize: '16px', fontWeight: '600', marginBottom: '16px' }}>Start New Session</h2>
                    
                    <div className="form-group">
                        <label className="form-label">Type</label>
                        <select className="dropdown-select" value={type} onChange={(e) => setType(e.target.value)}>
                            <option value="gym">Gym</option>
                            <option value="golf">Golf</option>
                            <option value="study">Study</option>
                        </select>
                    </div>
                    
                    <div className="form-group">
                        <label className="form-label">What am I working on today?</label>
                        <textarea
                            className="bestme-input"
                            value={intention}
                            onChange={(e) => setIntention(e.target.value)}
                            placeholder="Describe your intention..."
                            style={{ minHeight: '80px', resize: 'vertical' }}
                        />
                    </div>
                    
                    <div className="form-group">
                        <label className="form-label">Intention Rating</label>
                        <div className="rating-picker">
                            {[1, 2, 3, 4, 5].map(n => (
                                <button
                                    key={n}
                                    className={`rating-btn ${rating === n ? 'selected' : ''}`}
                                    onClick={() => setRating(n)}
                                >
                                    {n}

                    <div style={{ display: 'flex', gap: '12px' }}>
                        <button

                            style={{ flex: 1 }}
                            onClick={onCancel}
                        >
                            Cancel
                        </button>
                        <button

                            style={{ flex: 1 }}
                            onClick={() => onStart(type, intention, rating)}
                        >
                            Start
                        </button>
                    </div>
                </>
            );
        };
        
        const CompleteSessionForm = ({ session, onComplete, onCancel }) => {

            const [processRating, setProcessRating] = useState(session.processRating);
            const [duration, setDuration] = useState(session.duration);
            const [golfScore, setGolfScore] = useState(session.golfScore || '');
            const [golfCourse, setGolfCourse] = useState(session.golfCourse || '');
            
            return (
