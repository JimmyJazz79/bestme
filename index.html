        // INSIGHTS TAB
        const InsightsTab = ({ habits, sessions, weeklyReviews, quarterlyReviews, setQuarterlyReviews }) => {
            const [showReviewHistory, setShowReviewHistory] = useState(false);
            const [quarterlyOpen, setQuarterlyOpen] = useState(false);
            
            // Get last 12 weeks of data
            const getLast12Weeks = () => {
                const currentWeek = getISOWeek();
                const [year, week] = currentWeek.split('-W').map(Number);
                const weeks = [];
                
                for (let i = 11; i >= 0; i--) {
                    let w = week - i;
                    let y = year;
                    if (w < 1) {
                        w += 52;
                        y -= 1;
                    }
                    weeks.push(`${y}-W${String(w).padStart(2, '0')}`);
                }
                return weeks;
            };
            
            const weeks = getLast12Weeks();
            
            const habitTrendData = weeks.map(weekKey => {
                const weekData = habits[weekKey];
                let completedHabits = 0;
                let totalHabits = 0;
                
                if (weekData) {
                    HABITS_ORDER.forEach(habitKey => {
                        const config = HABIT_CONFIG[habitKey];
                        const weekDates = getWeekDates(weekKey);
                        let habitCount = 0;
                        let habitTarget = 0;
                        
                        weekDates.forEach(dateStr => {
                            const dayIndex = getDayIndex(dateStr);
                            if (config.weekdaysOnly && (dayIndex === 0 || dayIndex === 6)) return;
                            
                            const value = weekData[dateStr]?.[habitKey];
                            if (config.type === 'bool') {
                                if (value) habitCount++;
                                habitTarget++;
                            } else {
                                habitCount += value || 0;
                                habitTarget += config.target;
                            }
                        });
                        
                        if (habitTarget > 0) {
                            completedHabits += (habitCount / habitTarget);
                            totalHabits++;
                        }
                    });
                }
                
                const score = totalHabits > 0 ? Math.min(100, (completedHabits / totalHabits) * 100) : 0;
                return { week: weekKey.split('-W')[1], score: Math.round(score) };
            });
            
            // Habit breakdown for last 4 weeks
            const last4Weeks = weeks.slice(-4);
            const habitBreakdown = HABITS_ORDER.map(habitKey => {
                const config = HABIT_CONFIG[habitKey];
                let totalCount = 0;
                let totalTarget = 0;
                
                last4Weeks.forEach(weekKey => {
                    const weekData = habits[weekKey];
                    const weekDates = getWeekDates(weekKey);
                    
                    weekDates.forEach(dateStr => {
                        const dayIndex = getDayIndex(dateStr);
                        if (config.weekdaysOnly && (dayIndex === 0 || dayIndex === 6)) return;
                        
                        const value = weekData?.[dateStr]?.[habitKey];
                        if (config.type === 'bool') {
                            if (value) totalCount++;
                            totalTarget++;
                        } else {
                            totalCount += value || 0;
                            totalTarget += config.target * 4;
                        }
                    });
                });
                
                const completion = totalTarget > 0 ? (totalCount / totalTarget) * 100 : 0;
                return {
                    name: config.label,
                    completion: Math.round(completion),
                    value: Math.round(completion)
                };
            }).sort((a, b) => a.completion - b.completion);
            
            // Process rating trend
            const processRatingData = [];
            const last8Weeks = weeks.slice(-8);
            last8Weeks.forEach(weekKey => {
                const weekSessions = sessions.filter(s => getISOWeek(new Date(s.date + 'T00:00:00Z')) === weekKey);
                
                let golfRating = 0, gymRating = 0, studyRating = 0;
                let golfCount = 0, gymCount = 0, studyCount = 0;
                
                weekSessions.forEach(s => {
                    if (s.completed) {
                        if (s.type === 'golf') { golfRating += s.processRating; golfCount++; }
                        if (s.type === 'gym') { gymRating += s.processRating; gymCount++; }
                        if (s.type === 'study') { studyRating += s.processRating; studyCount++; }
                    }
                });
                
                processRatingData.push({
                    week: weekKey.split('-W')[1],
                    golf: golfCount > 0 ? (golfRating / golfCount).toFixed(1) : null,
                    gym: gymCount > 0 ? (gymRating / gymCount).toFixed(1) : null,
                    study: studyCount > 0 ? (studyRating / studyCount).toFixed(1) : null
                });
            });
            
            return (
                <div>
                    <h1 style={{ fontSize: '28px', fontWeight: '700', marginBottom: '24px' }}>Insights</h1>
                    
                    {/* Habit Completion Trend */}
                    <div className="bestme-card">
                        <h2 style={{ fontSize: '14px', fontWeight: '600', marginBottom: '12px', color: '#CCC' }}>Habit Completion Trend</h2>
                        <ResponsiveContainer width="100%" height={150}>
                            <LineChart data={habitTrendData} margin={{ top: 5, right: 5, left: -20, bottom: 5 }}>
                                <CartesianGrid strokeDasharray="0" stroke="#2A2A2A" vertical={false} />
                                <XAxis dataKey="week" style={{ fontSize: '11px', color: '#888' }} />
                                <YAxis hide domain={[0, 100]} />
                                <Tooltip
                                    contentStyle={{
                                        background: '#161616',
                                        border: '1px solid #2A2A2A',
                                        borderRadius: '8px'
                                    }}
                                />
                                <Line
                                    type="monotone"
                                    dataKey="score"
                                    stroke="#E8620A"
                                    dot={false}
                                    strokeWidth={2}
                                    isAnimationActive={false}
                                />
                            </LineChart>
                        </ResponsiveContainer>
                    </div>
                    
                    {/* Habit Breakdown */}
                    <div className="bestme-card">
                        <h2 style={{ fontSize: '14px', fontWeight: '600', marginBottom: '12px', color: '#CCC' }}>Habit Breakdown (Last 4 Weeks)</h2>
                        <ResponsiveContainer width="100%" height={200}>
                            <BarChart
                                layout="vertical"
                                data={habitBreakdown}
                                margin={{ top: 5, right: 30, left: 80, bottom: 5 }}
                            >
                                <CartesianGrid strokeDasharray="0" stroke="#2A2A2A" />
                                <XAxis type="number" style={{ fontSize: '11px', color: '#888' }} />
                                <YAxis dataKey="name" type="category" style={{ fontSize: '11px', color: '#888' }} width={75} />
                                <Tooltip
                                    contentStyle={{
                                        background: '#161616',
                                        border: '1px solid #2A2A2A',
                                        borderRadius: '8px'
                                    }}
                                />
                                <Bar dataKey="value" fill="#E8620A" />
                            </BarChart>
                        </ResponsiveContainer>
                    </div>
                    
                    {/* Process Rating Trend */}
                    {processRatingData.length > 0 && (
                        <div className="bestme-card">
                            <h2 style={{ fontSize: '14px', fontWeight: '600', marginBottom: '12px', color: '#CCC' }}>Process Rating by Type</h2>
                            <ResponsiveContainer width="100%" height={150}>
                                <LineChart data={processRatingData} margin={{ top: 5, right: 5, left: -20, bottom: 5 }}>
                                    <CartesianGrid strokeDasharray="0" stroke="#2A2A2A" vertical={false} />
                                    <XAxis dataKey="week" style={{ fontSize: '11px', color: '#888' }} />
                                    <YAxis hide domain={[0, 5]} />
                                    <Tooltip
                                        contentStyle={{
                                            background: '#161616',
                                            border: '1px solid #2A2A2A',
                                            borderRadius: '8px'
                                        }}
                                    />
                                    <Line type="monotone" dataKey="golf" stroke="#4CAF50" dot={false} strokeWidth={2} isAnimationActive={false} name="Golf" />
                                    <Line type="monotone" dataKey="gym" stroke="#2196F3" dot={false} strokeWidth={2} isAnimationActive={false} name="Gym" />
                                    <Line type="monotone" dataKey="study" stroke="#FF9800" dot={false} strokeWidth={2} isAnimationActive={false} name="Study" />
                                </LineChart>
                            </ResponsiveContainer>
                        </div>
                    )}
                    
                    {/* Correlation Insights */}
                    <div className="bestme-card">
                        <h2 style={{ fontSize: '14px', fontWeight: '600', marginBottom: '12px', color: '#CCC' }}>Patterns & Correlations</h2>
                        <CorrelationInsights habits={habits} sessions={sessions} weeks={weeks} />
                    </div>
                    
                    {/* Coach Insights */}
                    <div className="bestme-card">
                        <h2 style={{ fontSize: '14px', fontWeight: '600', marginBottom: '12px', color: '#CCC' }}>Coach Insights</h2>
                        <CoachInsights habits={habits} sessions={sessions} weeks={weeks} />
                    </div>
                    
                    {/* Review History */}
                    <div className="bestme-card">
                        <div className="collapsible-header" onClick={() => setShowReviewHistory(!showReviewHistory)}>
                            <span style={{ fontWeight: '600' }}>Sunday Review History</span>
                            <span className={`collapsible-icon ${showReviewHistory ? 'open' : ''}`}>▼</span>
                        </div>
                        
                        {showReviewHistory && (
                            <div style={{ paddingTop: '16px' }}>
                                {Object.entries(weeklyReviews).reverse().slice(0, 10).map(([weekKey, review]) => (
                                    <ReviewHistoryItem key={weekKey} weekKey={weekKey} review={review} />
                                ))}
                            </div>
                        )}
                    </div>
                    
                    {/* Quarterly Review */}
                    <div className="bestme-card">
                        <div className="collapsible-header" onClick={() => setQuarterlyOpen(!quarterlyOpen)}>
                            <span style={{ fontWeight: '600' }}>Quarterly Review</span>
                            <span className={`collapsible-icon ${quarterlyOpen ? 'open' : ''}`}>▼</span>
                        </div>
                        
                        {quarterlyOpen && (
                            <QuarterlyReviewForm
                                reviews={quarterlyReviews}
                                onSave={(newReview) => {
                                    setQuarterlyReviews([...quarterlyReviews, newReview]);
                                }}
                            />
                        )}
                    </div>
                </div>
            );
        };
        
        const CorrelationInsights = ({ habits, sessions, weeks }) => {
            const insights = [];
            
            // Sleep vs process rating
            let sleepCount = 0, sleepSessionRating = 0, sleepSessionCount = 0;
            let noSleepCount = 0, noSleepSessionRating = 0, noSleepSessionCount = 0;
            
            weeks.slice(-4).forEach(weekKey => {
                const weekDates = getWeekDates(weekKey);
                const weekSessions = sessions.filter(s => getISOWeek(new Date(s.date + 'T00:00:00Z')) === weekKey && s.completed);
                
                weekDates.forEach(dateStr => {
                    const hadSleep = habits[weekKey]?.[dateStr]?.sleep;
                    const daySessions = weekSessions.filter(s => s.date === dateStr);
                    
                    if (hadSleep) {
                        sleepCount++;
                        daySessions.forEach(s => {
                            sleepSessionRating += s.processRating;
                            sleepSessionCount++;
                        });
                    } else {
                        noSleepCount++;
                        daySessions.forEach(s => {
                            noSleepSessionRating += s.processRating;
                            noSleepSessionCount++;
                        });
                    }
                });
            });
            
            if (sleepSessionCount > 0 && noSleepSessionCount > 0) {
                const sleepAvg = sleepSessionRating / sleepSessionCount;
                const noSleepAvg = noSleepSessionRating / noSleepSessionCount;
                if (sleepAvg > noSleepAvg + 0.5) {
                    insights.push(`You performed ${(sleepAvg - noSleepAvg).toFixed(1)} points better on days with sleep.`);
                }
            }
            
            // Gym vs golf performance
            let gymDays = 0, golfRatingOnGymDays = 0, golfCountOnGymDays = 0;
            let noGymDays = 0, golfRatingNoGymDays = 0, golfCountNoGymDays = 0;
            
            weeks.slice(-4).forEach(weekKey => {
                const weekDates = getWeekDates(weekKey);
                const weekSessions = sessions.filter(s => getISOWeek(new Date(s.date + 'T00:00:00Z')) === weekKey && s.completed && s.type === 'golf');
                
                weekDates.forEach(dateStr => {
                    const hadGym = habits[weekKey]?.[dateStr]?.gym;
                    const daySessions = weekSessions.filter(s => s.date === dateStr);
                    
                    if (hadGym) {
                        gymDays++;
                        daySessions.forEach(s => {
                            golfRatingOnGymDays += s.processRating;
                            golfCountOnGymDays++;
                        });
                    } else {
                        noGymDays++;
                        daySessions.forEach(s => {
                            golfRatingNoGymDays += s.processRating;
                            golfCountNoGymDays++;
                        });
                    }
                });
            });
            
            if (golfCountOnGymDays > 0 && golfCountNoGymDays > 0) {
                const gymAvg = golfRatingOnGymDays / golfCountOnGymDays;
                const noGymAvg = golfRatingNoGymDays / golfCountNoGymDays;
                if (Math.abs(gymAvg - noGymAvg) > 0.3) {
                    const direction = gymAvg > noGymAvg ? 'better' : 'worse';
                    insights.push(`Your golf process rating is ${direction} on gym days.`);
                }
            }
            
            // Study + Trello correlation
            let bothDays = 0, bothProgress = 0;
            weeks.slice(-4).forEach(weekKey => {
                const weekDates = getWeekDates(weekKey);
                weekDates.forEach(dateStr => {
                    const hasStudy = (habits[weekKey]?.[dateStr]?.study || 0) > 0;
                    const hasTrello = habits[weekKey]?.[dateStr]?.trello;
                    if (hasStudy && hasTrello) {
                        bothDays++;
                        bothProgress++;
                    }
                });
            });
            
            if (bothDays > 0) {
                insights.push(`You study more consistently when you plan your day first — it happened ${bothDays} times in the last 4 weeks.`);
            }
            
            if (insights.length === 0) {
                insights.push('Keep tracking to discover patterns.');
            }
            
            return (
                <div style={{ fontSize: '13px', lineHeight: '1.6', color: '#CCC' }}>
                    {insights.map((insight, idx) => (
                        <p key={idx} style={{ margin: '8px 0' }}>• {insight}</p>
                    ))}
                </div>
            );
        };
        
        const CoachInsights = ({ habits, sessions, weeks }) => {
            const insights = [];
            
            // Overall consistency
            const avgCompletion = weeks.slice(-4).reduce((sum, weekKey) => {
                let completed = 0, total = 0;
                HABITS_ORDER.forEach(habitKey => {
                    const config = HABIT_CONFIG[habitKey];
                    const weekDates = getWeekDates(weekKey);
                    let habitCount = 0, habitTarget = 0;
                    
                    weekDates.forEach(dateStr => {
                        const dayIndex = getDayIndex(dateStr);
                        if (config.weekdaysOnly && (dayIndex === 0 || dayIndex === 6)) return;
                        const value = habits[weekKey]?.[dateStr]?.[habitKey];
                        if (config.type === 'bool') {
                            if (value) habitCount++;
                            habitTarget++;
                        } else {
                            habitCount += value || 0;
                            habitTarget += config.target;
                        }
                    });
                    
                    if (habitTarget > 0) {
                        completed += (habitCount / habitTarget);
                        total++;
                    }
                });
                return sum + (total > 0 ? (completed / total) : 0);
            }, 0) / 4;
            
            if (avgCompletion > 0.8) {
                insights.push("You're showing impressive consistency. The key now is deepening your intentionality in each session.");
            } else if (avgCompletion > 0.6) {
                insights.push("You're on a solid foundation. Focus on filling the gaps in one habit this week to build momentum.");
            } else {
                insights.push("You've got potential here. Pick your top habit and commit to 100% for one week to build confidence.");
            }
            
            // Session frequency
            const completedSessions = sessions.filter(s => s.completed).length;
            if (completedSessions > 0) {
                insights.push(`You've logged ${completedSessions} sessions total. The richest insights come from consistent reflection after each one.`);
            }
            
            // Intentionality
            const avgIntentionRating = sessions
                .filter(s => s.completed)
                .reduce((sum, s) => sum + s.intentionRating, 0) / Math.max(1, sessions.filter(s => s.completed).length);
            
            if (avgIntentionRating > 3.5) {
                insights.push("Your intentions are clear and strong. Channel that clarity into your execution this week.");
            }
            
            return (
                <div style={{ fontSize: '13px', lineHeight: '1.6', color: '#CCC' }}>
                    {insights.map((insight, idx) => (
                        <p key={idx} style={{ margin: '8px 0' }}>• {insight}</p>
                    ))}
                </div>
            );
        };
        
        const ReviewHistoryItem = ({ weekKey, review }) => {
            const [expanded, setExpanded] = useState(false);
            
            return (
                <div
                    className="collapsible-header"
                    style={{ cursor: 'pointer', borderBottom: '1px solid #2A2A2A', marginBottom: '8px' }}
                    onClick={() => setExpanded(!expanded)}
                >
                    <span style={{ fontSize: '13px', color: '#CCC' }}>{weekKey}</span>
                    <span className={`collapsible-icon ${expanded ? 'open' : ''}`}>▼</span>
                    
                    {expanded && (
                        <div style={{ position: 'absolute', left: 0, right: 0, top: '100%', background: '#161616', padding: '12px', marginTop: '8px', borderRadius: '8px', zIndex: 10 }}>
                            {review.q1 && (
                                <div style={{ marginBottom: '12px', fontSize: '12px' }}>
                                    <strong style={{ color: '#E8620A' }}>Completion:</strong> {review.q1}
                                </div>
                            )}
                            {review.q2 && (
                                <div style={{ marginBottom: '12px', fontSize: '12px' }}>
                                    <strong style={{ color: '#E8620A' }}>Proud of:</strong> {review.q2}
                                </div>
                            )}
                            {review.q3 && (
                                <div style={{ marginBottom: '12px', fontSize: '12px' }}>
                                    <strong style={{ color: '#E8620A' }}>Fell short:</strong> {review.q3}
                                </div>
                            )}
                            {review.q4 && (
                                <div style={{ marginBottom: '12px', fontSize: '12px' }}>
                                    <strong style={{ color: '#E8620A' }}>Intention:</strong> {review.q4}
                                </div>
                            )}
                            {review.q5 && (
                                <div style={{ fontSize: '12px' }}>
                                    <strong style={{ color: '#E8620A' }}>Next week:</strong> {review.q5}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };
        
        const QuarterlyReviewForm = ({ reviews, onSave }) => {
            const currentQuarter = `${new Date().getFullYear()}-Q${Math.floor(new Date().getMonth() / 3) + 1}`;
            const existing = reviews.find(r => r.quarter === currentQuarter);
            
            const [q1, setQ1] = useState(existing?.q1 || '');
            const [q2, setQ2] = useState(existing?.q2 || '');
            const [q3, setQ3] = useState(existing?.q3 || '');
            const [q4, setQ4] = useState(existing?.q4 || '');
            const [q5, setQ5] = useState(existing?.q5 || '');
            const [q6, setQ6] = useState(existing?.q6 || '');
            const [commitments, setCommitments] = useState(existing?.commitments || ['', '', '']);
            
            const handleSave = () => {
                if (q1 && q2 && q3 && q4 && q5 && q6) {
                    onSave({
                        quarter: currentQuarter,
                        q1, q2, q3, q4, q5, q6,
                        commitments: commitments.filter(c => c),
                        completedAt: new Date().toISOString()
                    });
                }
            };
            
            return (
                <div style={{ paddingTop: '16px' }}>
                    <div style={{ marginBottom: '16px', padding: '12px', background: '#0F0F0F', borderRadius: '8px', fontSize: '13px', color: '#888' }}>
                        {currentQuarter} Review
                    </div>
                    
                    {[1, 2, 3, 4, 5, 6].map(n => (
                        <div key={n} className="form-group">
                            <label className="form-label">Question {n}</label>
                            <textarea
                                className="bestme-input"
                                value={[q1, q2, q3, q4, q5, q6][n - 1]}
                                onChange={(e) => {
                                    const updates = [q1, q2, q3, q4, q5, q6];
                                    updates[n - 1] = e.target.value;
                                    if (n === 1) setQ1(e.target.value);
                                    if (n === 2) setQ2(e.target.value);
                                    if (n === 3) setQ3(e.target.value);
                                    if (n === 4) setQ4(e.target.value);
                                    if (n === 5) setQ5(e.target.value);
                                    if (n === 6) setQ6(e.target.value);
                                }}
                                placeholder={`Quarter reflection ${n}...`}
                                style={{ minHeight: '60px', resize: 'vertical' }}
                            />
                        </div>
                    ))}
                    
                    <div className="form-group">
                        <label className="form-label">3 Commitments for next quarter</label>
                        {[0, 1, 2].map(idx => (
                            <input
                                key={idx}
                                type="text"
                                className="bestme-input"
                                value={commitments[idx]}
                                onChange={(e) => {
                                    const newCommitments = [...commitments];
                                    newCommitments[idx] = e.target.value;
                                    setCommitments(newCommitments);
                                }}
                                placeholder={`Commitment ${idx + 1}...`}
                                style={{ marginBottom: '8px' }}
                            />
                        ))}
                    </div>
                    
                    <button
                        className="bestme-button"
                        style={{ width: '100%' }}
                        onClick={handleSave}
                    >
                        Save Quarterly Review
                    </button>
                </div>
            );
        };
        
        // Root render
        ReactDOM.createRoot(document.getElementById('root')).render(
            <React.StrictMode>
                <BestMeApp />
            </React.StrictMode>
        );
    </script>
</body>
</html>
